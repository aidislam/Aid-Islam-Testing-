name: Build 32-bit OS

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-os:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Install NASM and Multi-lib Build Tools
      run: |
        sudo apt-get update
        # gcc-multilib ইনস্টল করলে স্ট্যান্ডার্ড gcc দিয়েই ৩২-বিট ওএস কম্পাইল করা সম্ভব
        sudo apt-get install -y build-essential nasm gcc-multilib

    - name: Setup i686-elf-gcc Alias (Fix Makefile)
      run: |
        # আপনার Makefile যেহেতু 'i686-elf-gcc' এবং 'i686-elf-ld' খোঁজে,
        # আমরা সিস্টেমের ৩-বিট কম্পাইলারকে সেটির সাথে লিংক (Alias) করে দিচ্ছি।
        sudo ln -s /usr/bin/gcc /usr/bin/i686-elf-gcc
        sudo ln -s /usr/bin/ld /usr/bin/i686-elf-ld

    - name: Clean Previous Builds
      run: |
        make clean || true

    - name: Compile and Build OS Image
      run: |
        # এবার আপনার Makefile কোনো থার্ড-পার্টি অ্যাকশন ছাড়াই রান হবে
        make

    - name: Check Built Files (Diagnostics)
      run: |
        ls -la

    - name: Upload OS Binary Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Simple-32bit-OS-Image
        path: |
          *.bin
          *.iso
          *.img
          *.o
