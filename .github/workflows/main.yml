name: Build 32-bit OS

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-os:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Install NASM and Multi-lib Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential nasm gcc-multilib

    - name: Setup i686-elf Toolchain Alias (Fix Makefile)
      run: |
        # আপনার Makefile-এ ব্যবহৃত সবকটি টুলের জন্য উবুন্টুর অফিশিয়াল পাথের সাথে সিমলিংক তৈরি করা হলো
        sudo ln -s /usr/bin/gcc /usr/bin/i686-elf-gcc
        sudo ln -s /usr/bin/ld /usr/bin/i686-elf-ld
        sudo ln -s /usr/bin/objcopy /usr/bin/i686-elf-objcopy

    - name: Clean Previous Builds
      run: |
        make clean || true

    - name: Compile and Build OS Image
      run: |
        # এবার objcopy সহ সব টুল রেডি, তাই ওএস সম্পূর্ণ বিল্ড হবে
        make

    - name: Check Built Files (Diagnostics)
      run: |
        ls -la

    - name: Upload OS Binary Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Simple-32bit-OS-Image
        path: |
          *.bin
          *.iso
          *.img
          *.elf
