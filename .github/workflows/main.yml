name: Build 32-bit OS with Cross-Compiler

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-os:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Install Standard Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential nasm

    - name: Setup i686-elf-gcc Cross-Compiler Toolchain
      # এই একশনটি সরাসরি গিটহাব রানারে নিখুঁতভাবে i686-elf-gcc সেটআপ করে দেয়
      uses: ncruces/x86_64-gcc-action@v1
      with:
        target: i686-elf

    - name: Verify GCC Compiler Installation
      run: |
        # কম্পাইলারটি ঠিকঠাক কাজ করছে কি না তা নিশ্চিত করার জন্য সংস্করণ পরীক্ষা করা
        i686-elf-gcc --version

    - name: Clean Previous Builds
      run: |
        make clean || true

    - name: Compile and Build OS Image
      run: |
        # এবার 'make' রান করলে কোনো এরর ছাড়াই সাকসেসফুলি বিল্ড হবে
        make

    - name: Check Built Files (Diagnostics)
      run: |
        ls -la

    - name: Upload OS Binary Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Simple-32bit-OS-Image
        path: |
          *.bin
          *.iso
          *.img
          *.o
