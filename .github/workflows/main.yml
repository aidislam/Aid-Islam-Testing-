name: Build 32-bit OS

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-os:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Install Prerequisites (GCC, NASM, Make)
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential nasm

    - name: Clean Previous Builds
      run: |
        # যদি আপনার Makefile-এ clean রুল থাকে, তবে এটি আগের জেনারেট হওয়া ফাইল মুছে দেবে
        make clean || true

    - name: Compile and Build OS Image
      run: |
        # এটি সরাসরি আপনার Makefile রান করবে এবং পুরো ওএস বিল্ড করবে
        make

    - name: Check Built Files
      run: |
        # বিল্ড শেষে কী কী ফাইল তৈরি হলো তা দেখার জন্য (ডায়াগনস্টিকস)
        ls -la

    - name: Upload OS Binary Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Simple-32bit-OS-Image
        # আপনার Makefile বিল্ড শেষে যে ফাইনাল ফাইলটি তৈরি করে (যেমন: os-image.bin বা kernel.bin), 
        # সেটি যদি নির্দিষ্ট কোনো নামে বা ফোল্ডারে থাকে তবে নিচের স্টার (*) চিহ্নের জায়গায় সেই নামটি লিখে দিতে পারেন।
        # আপাতত এটি বিল্ড হওয়া সব প্রয়োজনীয় ফাইল আপলোড করবে।
        path: |
          *.bin
          *.iso
          *.img
