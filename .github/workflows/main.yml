name: Build 32-bit OS

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-os:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Install NASM and Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential nasm

    - name: Setup i686-elf-gcc Cross-Compiler
      # এটি গিটহাবের সবচেয়ে জনপ্রিয় এবং আপ-টু-ডেট ক্রোস-কম্পাইলার অ্যাকশন
      uses: caorandis/setup-i686-elf-gcc@v1

    - name: Clean Previous Builds
      run: |
        make clean || true

    - name: Compile and Build OS Image
      run: |
        # i686-elf-gcc সফলভাবে সেটআপ হওয়ার পর 'make' রান হবে
        make

    - name: Check Built Files (Diagnostics)
      run: |
        ls -la

    - name: Upload OS Binary Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Simple-32bit-OS-Image
        path: |
          *.bin
          *.iso
          *.img
          *.o
