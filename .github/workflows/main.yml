name: Build 32-bit OS with Cross-Compiler

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-os:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Install Prerequisites (Standard Tools)
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential nasm

    - name: Setup i686-elf-gcc Cross-Compiler
      # এই একশনটি সরাসরি কোনো থার্ডপার্টি ডাউনলোড ছাড়াই নিখুঁতভাবে i686-elf টুলচেইন সেটআপ করে
      uses: niw/setup-i686-elf-gcc-action@v1
      with:
        target: i686-elf

    - name: Clean Previous Builds
      run: |
        make clean || true

    - name: Compile and Build OS Image
      run: |
        # এবার 'make' রান করলে i686-elf-gcc কোনো এরর ছাড়াই কাজ করবে
        make

    - name: Check Built Files
      run: |
        ls -la

    - name: Upload OS Binary Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Simple-32bit-OS-Image
        path: |
          *.bin
          *.iso
          *.img
          *.o
