name: Build 32-bit OS

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-os:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Install NASM and Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential nasm

    - name: Setup i686-elf-gcc Cross-Compiler
      # এটি সরাসরি একটি ডেডিকেটেড গিটহাব অ্যাকশন ব্যবহার করে i686-elf-gcc টুলচেইন সেটআপ করবে
      uses: niw/setup-i686-elf-gcc-action@v1

    - name: Clean Previous Builds
      run: |
        # আগের কোনো বিল্ড ফাইল থাকলে তা পরিষ্কার করবে
        make clean || true

    - name: Compile and Build OS Image
      run: |
        # এবার i686-elf-gcc সম্পূর্ণ রেডি, তাই 'make' সফলভাবে রান হবে
        make

    - name: Check Built Files (Diagnostics)
      run: |
        ls -la

    - name: Upload OS Binary Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Simple-32bit-OS-Image
        path: |
          *.bin
          *.iso
          *.img
          *.o
